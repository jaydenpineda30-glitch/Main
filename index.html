<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futuristic Glass UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #05071a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* Animated background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(255, 80, 0, 0.35) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 20%, rgba(80, 0, 255, 0.4) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(0, 20, 80, 0.9) 0%, transparent 70%),
        #05071a;
    }

    .bg::before,
    .bg::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(2px);
    }

    /* Neon streaks */
    .streak {
      position: absolute;
      height: 2px;
      border-radius: 999px;
      opacity: 0.7;
    }

    .streak-1 {
      width: 300px;
      background: linear-gradient(90deg, transparent, #ff6a00, #ee0979);
      top: 30%;
      left: -50px;
      transform: rotate(-30deg);
      animation: streak-move 4s ease-in-out infinite alternate;
    }

    .streak-2 {
      width: 250px;
      background: linear-gradient(90deg, transparent, #7f00ff, #4fc3f7);
      bottom: 25%;
      right: -30px;
      transform: rotate(25deg);
      animation: streak-move 5s ease-in-out infinite alternate-reverse;
    }

    .streak-3 {
      width: 180px;
      background: linear-gradient(90deg, transparent, #00e5ff);
      top: 55%;
      left: 5%;
      transform: rotate(-15deg);
      animation: streak-move 3.5s ease-in-out infinite alternate;
    }

    @keyframes streak-move {
      from { opacity: 0.5; transform: translateY(-8px) rotate(-30deg); }
      to   { opacity: 0.9; transform: translateY(8px) rotate(-28deg); }
    }

    /* Glowing particles */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      animation: float var(--dur) ease-in-out var(--delay) infinite;
    }

    @keyframes float {
      0%   { opacity: 0; transform: translateY(0) scale(0.5); }
      50%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 360px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 24px 20px 20px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    /* Top nav */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .top-title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .top-icons {
      display: flex;
      gap: 12px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      color: rgba(255,255,255,0.7);
    }

    .icon-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    /* Panels row */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 14px;
    }

    /* Analytics panel */
    .panel-analytics .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .panel-label {
      font-size: 13px;
      font-weight: 600;
      color: #4fc3f7;
    }

    .badge-positive {
      font-size: 12px;
      font-weight: 700;
      color: #69f0ae;
      background: rgba(105, 240, 174, 0.15);
      padding: 2px 7px;
      border-radius: 99px;
    }

    /* Chart */
    .chart-wrap {
      height: 80px;
      position: relative;
    }

    .chart-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .chart-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
    }

    .chart-labels span {
      font-size: 9px;
      color: rgba(255,255,255,0.4);
    }

    /* User stats panel */
    .panel-user .user-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7f00ff, #e100ff);
      border: 2px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .user-handle {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .stat-value.down {
      color: #ff6b6b;
    }

    .stat-label {
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      margin-top: 1px;
    }

    .stat-posts {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .stat-posts .stat-value {
      font-size: 15px;
    }

    /* Action buttons */
    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1.4fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .btn {
      padding: 11px 0;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      outline: none;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
    }

    .btn-ghost:hover {
      background: rgba(255,255,255,0.15);
    }

    .btn-primary {
      background: transparent;
      border: 2px solid #7f00ff;
      color: #c77dff;
      box-shadow: 0 0 14px rgba(127,0,255,0.4), inset 0 0 8px rgba(127,0,255,0.1);
    }

    .btn-primary:hover {
      background: rgba(127,0,255,0.15);
      box-shadow: 0 0 20px rgba(127,0,255,0.6), inset 0 0 12px rgba(127,0,255,0.15);
    }

    /* Bottom nav */
    .bottom-nav {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .nav-btn {
      height: 48px;
      border-radius: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(255,255,255,0.5);
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    .nav-btn.active {
      background: linear-gradient(135deg, rgba(127,0,255,0.3), rgba(0,180,255,0.2));
      border-color: rgba(127,0,255,0.4);
      color: #c77dff;
      box-shadow: 0 0 10px rgba(127,0,255,0.3);
    }

    svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

<div class="bg">
  <div class="streak streak-1"></div>
  <div class="streak streak-2"></div>
  <div class="streak streak-3"></div>
  <div class="particles" id="particles"></div>
</div>

<div class="card">

  <!-- Top nav -->
  <div class="top-nav">
    <span class="top-title">Futuristic Glass UI</span>
    <div class="top-icons">
      <button class="icon-btn" title="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      </button>
      <button class="icon-btn" title="Notifications">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </button>
      <button class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>

  <!-- Analytics + User Stats -->
  <div class="panels">

    <!-- Analytics -->
    <div class="panel panel-analytics">
      <div class="panel-header">
        <span class="panel-label">Analytics</span>
        <span class="badge-positive">+18%</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <div class="chart-labels">
        <span>Jan</span><span>Apr</span><span>Jul</span>
      </div>
    </div>

    <!-- User Stats -->
    <div class="panel panel-user">
      <div class="panel-label" style="margin-bottom:10px;">User Stats</div>
      <div class="user-top">
        <div class="avatar">👤</div>
        <div>
          <div class="user-name">Username</div>
          <div class="user-handle">@username</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value">1,289</div>
          <div class="stat-label">Posts</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">56k</div>
          <div class="stat-label">Followers</div>
        </div>
        <div class="stat-item">
          <div class="stat-value down">↓250</div>
          <div class="stat-label">Followers</div>
        </div>
        <div class="stat-item">
          <div class="stat-value down">↓230</div>
          <div class="stat-label">Following</div>
        </div>
      </div>
    </div>

  </div>

  <!-- Action buttons -->
  <div class="action-row">
    <button class="btn btn-ghost">Upload</button>
    <button class="btn btn-ghost">Settings</button>
    <button class="btn btn-primary">Upgrade Pro</button>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" title="Home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </button>
    <button class="nav-btn" title="Search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    </button>
    <button class="nav-btn" title="Messages">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <button class="nav-btn" title="Dashboard">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    </button>
    <button class="nav-btn" title="More">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </button>
  </div>

</div>

<script>
  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --dur: ${2 + Math.random() * 4}s;
      --delay: ${Math.random() * 5}s;
      background: ${['#fff','#c77dff','#4fc3f7','#ff6a00'][Math.floor(Math.random()*4)]};
      width: ${1.5 + Math.random() * 2.5}px;
      height: ${1.5 + Math.random() * 2.5}px;
    `;
    container.appendChild(p);
  }

  // Chart
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;

  const line1 = [10,60,30,45,55,35,70,25,85,40,100];
  const line2 = [10,70,25,65,45,55,65,45,80,55,100];

  function drawLine(pts, color1, color2) {
    const xs = pts.map((_, i) => (i / (pts.length - 1)) * W);
    const ys = pts.map(p => H - (p / 100) * H * 0.9 - 4);

    // gradient fill
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, color1 + '55');
    grad.addColorStop(1, color1 + '00');
    ctx.beginPath();
    ctx.moveTo(xs[0], ys[0]);
    for (let i = 1; i < xs.length; i++) {
      const cx = (xs[i - 1] + xs[i]) / 2;
      ctx.bezierCurveTo(cx, ys[i - 1], cx, ys[i], xs[i], ys[i]);
    }
    ctx.lineTo(xs[xs.length - 1], H);
    ctx.lineTo(xs[0], H);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // line
    ctx.beginPath();
    ctx.moveTo(xs[0], ys[0]);
    for (let i = 1; i < xs.length; i++) {
      const cx = (xs[i - 1] + xs[i]) / 2;
      ctx.bezierCurveTo(cx, ys[i - 1], cx, ys[i], xs[i], ys[i]);
    }
    ctx.strokeStyle = color1;
    ctx.lineWidth = 2;
    ctx.shadowColor = color1;
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  drawLine(line1, '#4fc3f7', '#7f00ff');
  drawLine(line2, '#ee00aa', '#ff6a00');

  // Nav active toggle
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
</script>
</body>
</html>
