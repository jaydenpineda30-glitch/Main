function todayStr(){return new Date().toISOString().split("T")[0];}
function weekMonday(){const n=new Date();const d=n.getDay();const off=d===0?-6:1-d;const m=new Date(n);m.setDate(n.getDate()+off);return m.toISOString().split("T")[0];}
function daysBetween(s){const d=new Date(s);d.setHours(23,59,59);return Math.ceil((d-new Date())/864e5);}
function fmtDate(s){if(!s)return"";return new Date(s).toLocaleDateString("en-AU",{day:"numeric",month:"short"});}
function toMins(s){const parts=(s||"0:00").split(":");return parseInt(parts[0])*60+parseInt(parts[1]||0);}
function parseTimes(t){if(!t)return{start:480,end:540};const norm=t.replace(/[–-]/g,"|");const parts=norm.split("|");return{start:toMins(parts[0].trim()),end:toMins(parts[1].trim())};}
function getWeekDates(ref){const now=ref||new Date();const dow=now.getDay();const off=dow===0?-6:1-dow;return DAYS.map(function(_,i){const d=new Date(now);d.setDate(now.getDate()+off+i);return d;});}
function dStr(d){return d.toISOString().split("T")[0];}
function wCol(type){return type==="social"?"#1D9E75":"#5a6070";}
function shiftPay(timeStr){if(!timeStr)return null;const t=parseTimes(timeStr);const CUT=19*60;let norm=0,pen=0;for(let m=t.start;m<t.end;m++){m<CUT?norm++:pen++;}return{normalHrs:+(norm/60).toFixed(2),penaltyHrs:+(pen/60).toFixed(2),totalEquiv:+(norm/60+pen/60*1.5).toFixed(2)};}
function taskUrg(t){if(t.done)return"done";const od=t.due?daysBetween(t.due)*-1:0;const ref=t.editedAt||t.addedAt||todayStr();const age=Math.floor((new Date()-new Date(ref))/864e5);if(od>7)return"red";if(od>3)return"yellow";if(od>0)return"orange";if(age>7)return"yellow";return t.priority==="urgent"?"urgent":"normal";}
const TUC={red:T.danger,yellow:T.warn,orange:T.orange,urgent:T.danger,normal:T.text2,done:T.success};
const TUB={red:T.dangerBg,yellow:T.warnBg,orange:T.orangeBg,urgent:T.dangerBg,normal:T.bg3,done:T.successBg};
function taskLabel(t){if(t.done)return"done";const od=t.due?daysBetween(t.due)*-1:0;const ref=t.editedAt||t.addedAt||todayStr();const age=Math.floor((new Date()-new Date(ref))/864e5);if(od>0)return od+"d overdue";if(age>7)return"untouched "+age+"d";if(t.due)return"due "+fmtDate(t.due);return"";}

// ── Rule-based check-in ────────────────────────────────────────────────────
function generateCheckin(data){
  const blocks=[];
  const tUni=UNI_EVENTS.filter(function(ev){return ev.date===todayStr();});
  const tWork=WORK_EVENTS.filter(function(ev){return ev.date===todayStr();});
  const tmr=new Date(Date.now()+864e5).toISOString().split("T")[0];
  const tmrFree=UNI_EVENTS.filter(function(ev){return ev.date===tmr;}).length===0&&WORK_EVENTS.filter(function(ev){return ev.date===tmr;}).length===0;
  const soon=UNI_EVENTS.filter(function(ev){return ev.assessment&&daysBetween(ev.date)>=0&&daysBetween(ev.date)<=5;});
  const overdue=data.personal.tasks.filter(function(t){return !t.done&&t.due&&daysBetween(t.due)<0;});
  const urgent=data.personal.tasks.filter(function(t){return !t.done&&t.priority==="urgent"&&t.due&&daysBetween(t.due)>=0;});
  const gymRot=data.gym.rotation||[];
  const rotLen=gymRot.length>0?gymRot.length:1;
  const nextSess=gymRot.length>0?gymRot[(data.gym.rotIdx||0)%rotLen]:null;

  // Schedule block
  let schedLines=[];
  if(tUni.length>0){schedLines.push(tUni.map(function(ev){return(SUBJECTS[ev.subject]||ev.subject)+" "+ev.time+(ev.assessment?" 📋":"");}).join(" · "));}
  else{schedLines.push("No uni classes today.");}
  if(tWork.length>0){schedLines.push(tWork.map(function(ev){return ev.title+" "+ev.time;}).join(", "));}
  blocks.push({header:"📅 Today's Schedule",items:schedLines});

  // Assessments block
  if(soon.length>0){
    const lines=soon.map(function(ev){
      const d=daysBetween(ev.date);
      const when=d===0?"today":d===1?"tomorrow":"in "+d+" days";
      return(SUBJECTS[ev.subject]||ev.subject)+" — "+ev.title+" due "+when+". Have you made a start?";
    });
    blocks.push({header:"📋 Assessments",items:lines});
  }

  // Tasks block
  if(overdue.length>0||urgent.length>0){
    const lines=[];
    overdue.forEach(function(t){lines.push(t.name+" is "+Math.abs(daysBetween(t.due))+"d overdue — worth sorting today.");});
    urgent.forEach(function(t){lines.push(t.name+" is due "+fmtDate(t.due)+" — don't leave it too late.");});
    blocks.push({header:"✅ Tasks",items:lines});
  }

  // Suggestion block
  if(tmrFree){
    const pending=data.personal.tasks.filter(function(t){return !t.done;});
    if(pending.length>0){
      blocks.push({header:"💡 Suggestion",items:["Tomorrow looks free — good window to knock off "+pending[0].name+(pending.length>1?" or "+pending[1].name:"")+"."+(nextSess?" Could also fit in your "+nextSess.name+"!":"")]});
    } else {
      blocks.push({header:"💡 Suggestion",items:["Tomorrow is free — great chance to get ahead on study or hit the gym"+(nextSess?" ("+nextSess.name+" is up next).":".")]}); 
    }
  } else if(nextSess){
    blocks.push({header:"💡 Suggestion",items:["Next gym session is "+nextSess.name+" ("+nextSess.focus+"). Pre-fill your weights on the dashboard before you go."]});
  }

  // Question block
  if(soon.length>0){
    blocks.push({header:"❓ Check-in",items:["What's the first assessment you're going to put time into today, Jayden?"]});
  } else if(overdue.length>0){
    blocks.push({header:"❓ Check-in",items:["Which overdue task are you clearing first today?"]});
  } else {
    blocks.push({header:"❓ Check-in",items:["What's the one thing you want to have done by end of day?"]});
  }

  return blocks;
}

function Sparkline(props){

function App(){

  const upcoming=UNI_EVENTS.filter(function(ev){const ce=data.uni.completedEvents||[];return ev.assessment&&ce.indexOf(ev.id)===-1&&daysBetween(ev.date)>=0;}).sort(function(a,b){return new Date(a.date)-new Date(b.date);}).slice(0,8);

  function renderWeek(){

          <div style={card()}>
            <div style={sT}>Shift breakdown</div>
            {WORK_EVENTS.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);}).map(function(ev){const past=daysBetween(ev.date)<0;const pay=ev.type==="shift"?shiftPay(ev.time):null;return(<div key={ev.id} style={{display:"flex",gap:10,marginBottom:8,alignItems:"center",opacity:past?0.5:1,padding:"8px 10px",background:T.bg3,borderRadius:6}}><div style={{width:3,borderRadius:2,background:wCol(ev.type),alignSelf:"stretch",minHeight:24,flexShrink:0}}/><div style={{flex:1}}><div style={{display:"flex",gap:6,alignItems:"center",marginBottom:2}}><span style={{fontSize:11,fontWeight:600,color:ev.type==="social"?T.success:T.text}}>{ev.title}</span><span style={{fontSize:10,color:T.text3}}>{fmtDate(ev.date)} · {ev.time}</span>{past&&<span style={bdg("normal")}>past</span>}</div>{pay&&<div style={{display:"flex",gap:10,fontSize:10}}><span style={{color:T.success}}>{pay.normalHrs}h standard</span>{pay.penaltyHrs>0&&<span style={{color:T.warn}}>{pay.penaltyHrs}h × 1.5</span>}<span style={{color:T.text2,fontWeight:600}}>= {pay.totalEquiv}h equiv</span></div>}</div></div>);})}
          </div>
        </div>}

        {page==="Gym"&&<GymSection gymData={data.gym} onAddEx={function(){setModal("add_exercise");setMForm({});}} onLogW={function(ex){setModal("log_weight");setMForm({exId:ex.id,exName:ex.name});}} onSave={function(wk){setData(function(p){const rl=p.gym.rotation?p.gym.rotation.length:1;return{...p,gym:{...p.gym,workouts:(p.gym.workouts||[]).concat([wk]),rotIdx:((p.gym.rotIdx||0)+1)%Math.max(rl,1)}};});}} onUpdateRot={function(rot,idx){setData(function(p){return{...p,gym:{...p.gym,rotation:rot,rotIdx:idx}};});}}/>}

        {page==="Personal"&&<div style={{maxWidth:640}}>
          <div style={card()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={sT}>Tasks</div><div style={{display:"flex",gap:6}}>{doneTasks.length>0&&<button style={{...btn,color:T.success,borderColor:T.success+"50"}} onClick={archiveDone}>Archive done</button>}<button style={btn} onClick={function(){setModal("add_task");setMForm({priority:"normal",cat:"Errands"});}}>+ Task</button></div></div>
            {editTaskId&&<div style={{marginBottom:14,padding:"10px 12px",background:T.bg3,borderRadius:8,border:"0.5px solid "+T.accent+"40"}}><div style={{fontSize:11,color:T.accent,marginBottom:8,fontWeight:500}}>Editing task</div><div style={{display:"flex",flexDirection:"column",gap:6}}><input style={inp} value={editTaskForm.name||""} onChange={function(ev){setEditTaskForm(function(f){return{...f,name:ev.target.value};});}} placeholder="Task name"/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}><select style={inp} value={editTaskForm.cat||"Errands"} onChange={function(ev){setEditTaskForm(function(f){return{...f,cat:ev.target.value};});}}>{TASK_CATS.map(function(c){return<option key={c}>{c}</option>;})}</select><select style={inp} value={editTaskForm.priority||"normal"} onChange={function(ev){setEditTaskForm(function(f){return{...f,priority:ev.target.value};});}}><option value="normal">Normal</option><option value="urgent">Urgent</option></select><input type="date" style={inp} value={editTaskForm.due||""} onChange={function(ev){setEditTaskForm(function(f){return{...f,due:ev.target.value};});}}/></div><div style={{display:"flex",gap:6,justifyContent:"flex-end"}}><button style={btn} onClick={function(){setEditTaskId(null);}}>Cancel</button><button style={btnP} onClick={saveEditTask}>Save</button></div></div></div>}
            {data.personal.tasks.length===0&&<div style={{fontSize:12,color:T.text2}}>No tasks yet.</div>}
            {["urgent","normal"].map(function(pri){const tasks=data.personal.tasks.filter(function(t){return t.priority===pri;}).sort(function(a,b){return new Date(a.due||"9999")-new Date(b.due||"9999");});if(tasks.length===0)return null;return(<div key={pri} style={{marginBottom:14}}><div style={{fontSize:9,fontWeight:700,color:pri==="urgent"?T.danger:T.text3,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>{pri}</div>{tasks.map(function(t){const urg=taskUrg(t);const col=TUC[urg];const bg=TUB[urg];return(<div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8,padding:"8px 10px",borderRadius:7,background:bg,border:"0.5px solid "+col+"30"}}><input type="checkbox" checked={t.done} onChange={function(){toggleTask(t.id);}} style={{accentColor:T.accent,marginTop:2,flexShrink:0}}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:500,color:T.text,textDecoration:t.done?"line-through":"none"}}>{t.name}</div><div style={{fontSize:10,color:col,marginTop:1}}>{t.cat} · {taskLabel(t)}</div></div><button onClick={function(){setEditTaskId(t.id);setEditTaskForm({name:t.name,cat:t.cat,priority:t.priority,due:t.due});}} style={{...btn,fontSize:10,padding:"2px 7px"}}>Edit</button></div>);})}</div>);})}
          </div>
          {(data.personal.archived||[]).length>0&&<div style={card()}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{fontSize:12,fontWeight:500,color:T.text3}}>Archived ({(data.personal.archived||[]).length})</div><button style={btn} onClick={function(){setShowArch(function(a){return !a;});}}>{showArch?"Hide":"Show"}</button></div>{showArch&&(data.personal.archived||[]).slice().reverse().map(function(t){return(<div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,padding:"6px 0",borderBottom:"0.5px solid "+T.border}}><div><span style={{color:T.text3,textDecoration:"line-through"}}>{t.name}</span><span style={{fontSize:10,color:T.text3,marginLeft:8}}>{fmtDate(t.archivedAt)}</span></div><button onClick={function(){restoreTask(t.id);}} style={{...btn,fontSize:10,padding:"2px 8px",color:T.accent,borderColor:T.accent+"50"}}>Restore</button></div>);})}</div>}
          <div style={card()}><div style={sT}>Knowledge base</div><div style={{fontSize:11,color:T.text2,marginBottom:10}}>Notes here feed your daily check-in context.</div>{(data.docs||[]).map(function(d){return(<div key={d.id} style={{marginBottom:8,padding:"8px 10px",background:T.bg3,borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:12,fontWeight:500,color:T.text}}>{d.title}</div><div style={{fontSize:10,color:T.text3,marginTop:2}}>{d.content.slice(0,80)}...</div><div style={{marginTop:4,display:"flex",gap:4}}>{(d.tags||[]).map(function(tag){return<span key={tag} style={{fontSize:9,padding:"1px 6px",borderRadius:99,background:T.accentBg,color:T.accent}}>{tag}</span>;})}</div></div><button onClick={function(){setData(function(p){return{...p,docs:(p.docs||[]).filter(function(x){return x.id!==d.id;})};});}} style={{background:"none",border:"none",color:T.text3,cursor:"pointer",fontSize:16,marginLeft:8}}>×</button></div>);})}<div style={{marginTop:12,display:"flex",flexDirection:"column",gap:6}}><input style={inp} placeholder="Title" value={docIn.title} onChange={function(ev){setDocIn(function(p){return{...p,title:ev.target.value};});}}/><input style={inp} placeholder="Tags (comma separated)" value={docIn.tags} onChange={function(ev){setDocIn(function(p){return{...p,tags:ev.target.value};});}}/><textarea style={{...inp,resize:"vertical"}} rows={3} placeholder="Content..." value={docIn.content} onChange={function(ev){setDocIn(function(p){return{...p,content:ev.target.value};});}}/><button style={btnP} onClick={function(){if(!docIn.title||!docIn.content)return;setData(function(p){return{...p,docs:(p.docs||[]).concat([{id:"doc"+Date.now(),title:docIn.title,tags:docIn.tags.split(",").map(function(t){return t.trim();}),content:docIn.content}])};});setDocIn({title:"",tags:"",content:""});}}>Add document</button></div></div>
        </div>}

        {page==="Finance"&&<div style={{maxWidth:900}}><FinanceSection data={data.finance||{}} onUpdate={updateFinance}/></div>}

        {page==="Reflection"&&<div style={{maxWidth:600}}>
          <div style={card()}>
            <div style={sT}>Weekly Reflection</div>
            {reflStep===0&&<div><div style={{fontSize:12,color:T.text2,marginBottom:14,lineHeight:1.6}}>5 minutes at end of week. Honest answers only.{data.reflections.length>0&&<div style={{marginTop:6,color:T.text3}}>Last: {new Date(data.reflections[data.reflections.length-1].date).toLocaleDateString("en-AU")}</div>}</div><button style={btnP} onClick={function(){setReflStep(1);setReflAns([]);setReflSum("");}}>Start this week's reflection</button>{data.reflections.length>0&&<div style={{marginTop:16}}><div style={{fontSize:12,fontWeight:500,marginBottom:8,color:T.text}}>Previous</div>{data.reflections.slice(-3).reverse().map(function(r,i){const sum=r.summary?r.summary.slice(0,120):"";return<div key={i} style={{fontSize:11,color:T.text2,marginBottom:6,padding:"8px 10px",background:T.bg3,borderRadius:6}}><div style={{fontWeight:500,marginBottom:3,color:T.text}}>{new Date(r.date).toLocaleDateString("en-AU")}</div>{sum}</div>;})}</div>}</div>}
            {reflStep>0&&reflStep<=reflQs.length&&<div><div style={{fontSize:10,color:T.text3,marginBottom:6}}>Question {reflStep} of {reflQs.length}</div><div style={{fontSize:14,fontWeight:500,marginBottom:14,lineHeight:1.5,color:T.text}}>{reflQs[reflStep-1]}</div>{reflAns.map(function(qa,i){return<div key={i} style={{marginBottom:6,fontSize:11,color:T.text2,padding:"6px 10px",background:T.bg3,borderRadius:6}}><strong style={{color:T.text}}>{qa.q.slice(0,40)}...</strong><br/>{qa.a}</div>;})}<textarea value={reflIn} onChange={function(ev){setReflIn(ev.target.value);}} rows={4} style={{...inp,resize:"vertical",marginBottom:10}} placeholder="Your answer..."/><button style={btnP} onClick={submitRefl}>{reflStep<reflQs.length?"Next →":"Finish"}</button></div>}
            {reflStep>reflQs.length&&reflQs.length>0&&<div><div style={{fontSize:12,fontWeight:500,marginBottom:10,color:T.success}}>✓ Reflection saved</div><div style={{fontSize:13,lineHeight:1.7,color:T.text,marginBottom:14}}>{reflSum}</div><button style={btn} onClick={function(){setReflStep(0);}}>Done</button></div>}
          </div>
        </div>}
      </div>

      {modal&&<div style={{position:"fixed",inset:0,background:"rgba(5,7,26,0.75)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={function(){setModal(null);}}>
        <div style={{background:"rgba(255,255,255,0.09)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderRadius:16,padding:22,width:320,border:"0.5px solid rgba(199,125,255,0.25)",boxShadow:"0 8px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1)"}} onClick={function(ev){ev.stopPropagation();}}>
          <div style={{fontSize:14,fontWeight:500,marginBottom:14,color:T.text}}>{modal==="add_subject"&&"Add subject"}{modal==="add_exercise"&&"Add exercise"}{modal==="log_weight"&&"Log weight — "+(mForm.exName||"")}{modal==="add_task"&&"Add task"}</div>
          {(modal==="add_subject"||modal==="add_exercise"||modal==="add_task")&&<div style={{marginBottom:10}}><div style={{fontSize:11,color:T.text2,marginBottom:4}}>Name</div><input style={inp} value={mForm.name||""} onChange={function(ev){setMForm(function(f){return{...f,name:ev.target.value};});}} placeholder="Enter name..."/></div>}
          {modal==="log_weight"&&<div style={{marginBottom:10}}><div style={{fontSize:11,color:T.text2,marginBottom:4}}>Weight (kg)</div><input type="number" step="0.5" style={inp} value={mForm.weight||""} onChange={function(ev){setMForm(function(f){return{...f,weight:ev.target.value};});}} placeholder="e.g. 85"/></div>}
          {modal==="add_task"&&<div><div style={{marginBottom:10}}><div style={{fontSize:11,color:T.text2,marginBottom:4}}>Category</div><select style={inp} value={mForm.cat||"Errands"} onChange={function(ev){setMForm(function(f){return{...f,cat:ev.target.value};});}}>{TASK_CATS.map(function(c){return<option key={c}>{c}</option>;})}</select></div><div style={{marginBottom:10}}><div style={{fontSize:11,color:T.text2,marginBottom:4}}>Priority</div><select style={inp} value={mForm.priority||"normal"} onChange={function(ev){setMForm(function(f){return{...f,priority:ev.target.value};});}}><option value="normal">Normal</option><option value="urgent">Urgent</option></select></div><div style={{marginBottom:10}}><div style={{fontSize:11,color:T.text2,marginBottom:4}}>Due date</div><input type="date" style={inp} value={mForm.due||""} onChange={function(ev){setMForm(function(f){return{...f,due:ev.target.value};});}}/></div></div>}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:14}}><button style={btn} onClick={function(){setModal(null);}}>Cancel</button><button style={btnP} onClick={saveModal}>Save</button></div>
        </div>
      </div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
<script>
// Inject floating particles into the glass background
(function(){
  const bg=document.getElementById("glassBg");
  if(!bg)return;
  const colors=["#fff","#c77dff","#4fc3f7","#ff6a00","#69f0ae"];
  for(let i=0;i<45;i++){
    const p=document.createElement("div");
    const sz=(1.5+Math.random()*2.5)+"px";
    p.className="p";
    p.style.cssText="left:"+Math.random()*100+"%;top:"+Math.random()*100+"%;width:"+sz+";height:"+sz+";background:"+colors[Math.floor(Math.random()*colors.length)]+";--dur:"+(2+Math.random()*4)+"s;--delay:"+(Math.random()*6)+"s;";
    bg.appendChild(p);
  }
})();
</script>
</body>
</html>
